services:
  privacy-filter-api:
    build: .
    environment:
      OPF_DEVICE: ${OPF_DEVICE:-cpu}
      OPF_OUTPUT_MODE: ${OPF_OUTPUT_MODE:-typed}
      OPF_FALLBACK_TO_RU_RULES: ${OPF_FALLBACK_TO_RU_RULES:-true}
      OPF_TIMEOUT_SECONDS: ${OPF_TIMEOUT_SECONDS:-300}
      PRIVACY_FILTER_API_TOKEN: ${PRIVACY_FILTER_API_TOKEN:-}
      HF_TOKEN: ${HF_TOKEN:-}
      HF_HUB_DISABLE_XET: ${HF_HUB_DISABLE_XET:-1}
      HF_XET_NUM_CONCURRENT_RANGE_GETS: ${HF_XET_NUM_CONCURRENT_RANGE_GETS:-1}
      HF_XET_RECONSTRUCT_WRITE_SEQUENTIALLY: ${HF_XET_RECONSTRUCT_WRITE_SEQUENTIALLY:-1}
    volumes:
      - opf-model-cache:/root/.opf
    networks:
      - n8n-n8nrunnerpostgresollama-uxqm0a
    expose:
      - "8000"
    restart: unless-stopped

volumes:
  opf-model-cache:

networks:
  n8n-n8nrunnerpostgresollama-uxqm0a:
    external: true
