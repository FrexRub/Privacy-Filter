services:
  privacy-filter-api:
    build: .
    environment:
      OPF_CHECKPOINT: /models/privacy_filter
      OPF_DEVICE: cpu
      OPF_OUTPUT_MODE: typed
      OPF_TIMEOUT_SECONDS: 300
      PRIVACY_FILTER_API_TOKEN: ${PRIVACY_FILTER_API_TOKEN:-}
    volumes:
      - opf-model-cache:/models
    ports:
      - "8000:8000"
    restart: unless-stopped

volumes:
  opf-model-cache:
